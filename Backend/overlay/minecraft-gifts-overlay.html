<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StreamSync — Regalos Minecraft</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: transparent;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff; user-select: none;
    }

    /* ── Leyenda de regalos configurados ── */
    #legend {
      position: fixed; left: 18px; bottom: 18px;
      width: 360px; max-height: 78vh; overflow: hidden;
      background: linear-gradient(160deg, rgba(20,18,32,.86), rgba(28,18,42,.86));
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 16px; padding: 14px 14px 8px;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
      backdrop-filter: blur(6px);
    }
    #legend .legend-head {
      display: flex; align-items: center; gap: 8px;
      font-weight: 800; font-size: 16px; letter-spacing: .3px;
      padding-bottom: 10px; margin-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,.1);
    }
    #legend .legend-head .pick { font-size: 20px; }
    .rule {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 6px; border-radius: 10px;
      transition: background .2s ease;
    }
    .rule + .rule { border-top: 1px solid rgba(255,255,255,.05); }
    .rule.flash { animation: flash 1.4s ease; }
    @keyframes flash {
      0% { background: rgba(124,58,237,.55); transform: scale(1.02); }
      100% { background: transparent; transform: scale(1); }
    }
    .rule .gift {
      flex: 0 0 auto; min-width: 92px;
      font-weight: 800; font-size: 14px; color: #ffd56b;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .rule .arrow { color: rgba(255,255,255,.4); font-size: 13px; }
    .rule .cmd {
      flex: 1; font-size: 13px; color: #d7f7e6;
      font-family: 'Consolas', monospace;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .rule .cond {
      flex: 0 0 auto; font-size: 11px; color: #9fb4ff;
      background: rgba(120,140,255,.16); padding: 2px 7px; border-radius: 999px;
    }
    #legend .legend-empty { padding: 18px 6px; color: rgba(255,255,255,.55); font-size: 13px; text-align: center; }

    /* ── Toasts de disparo en vivo ── */
    #toasts {
      position: fixed; top: 18px; right: 18px;
      display: flex; flex-direction: column; gap: 10px; align-items: flex-end;
    }
    .toast {
      display: flex; align-items: center; gap: 12px;
      min-width: 280px; max-width: 420px;
      padding: 12px 16px; border-radius: 14px;
      background: linear-gradient(135deg, rgba(124,58,237,.95), rgba(236,72,153,.95));
      box-shadow: 0 16px 40px rgba(0,0,0,.45), inset 0 0 0 1px rgba(255,255,255,.2);
      opacity: 0; transform: translateX(60px) scale(.95);
      transition: opacity .35s ease, transform .35s cubic-bezier(.2,1.3,.4,1);
    }
    .toast.show { opacity: 1; transform: translateX(0) scale(1); }
    .toast .ava {
      width: 42px; height: 42px; border-radius: 50%;
      background: rgba(0,0,0,.25); flex: 0 0 auto;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; overflow: hidden;
    }
    .toast .ava img { width: 100%; height: 100%; object-fit: cover; }
    .toast .body { flex: 1; min-width: 0; }
    .toast .who { font-weight: 800; font-size: 15px; }
    .toast .what { font-size: 13px; opacity: .95; }
    .toast .what b { color: #ffe08a; }
    .toast .badge {
      flex: 0 0 auto; font-weight: 900; font-size: 14px;
      background: rgba(0,0,0,.3); padding: 4px 10px; border-radius: 999px;
    }

    #conn {
      position: fixed; bottom: 10px; right: 12px;
      display: flex; align-items: center; gap: 7px;
      font-size: 11px; color: rgba(255,255,255,.6);
      background: rgba(0,0,0,.4); padding: 5px 10px; border-radius: 999px;
    }
    #conn .dot { width: 9px; height: 9px; border-radius: 50%; background: #f04438; box-shadow: 0 0 8px #f04438; }
    #conn.on .dot { background: #16d680; box-shadow: 0 0 8px #16d680; }
  </style>
</head>
<body>
  <div id="legend">
    <div class="legend-head"><span class="pick">⛏️</span> Regalos &rarr; Minecraft</div>
    <div id="rules"></div>
  </div>

  <div id="toasts"></div>

  <div id="conn"><span class="dot"></span><span id="connText">conectando…</span></div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    const rulesEl = document.getElementById('rules');
    const toastsEl = document.getElementById('toasts');
    const connEl = document.getElementById('conn');
    const connText = document.getElementById('connText');

    // index por giftName (minúsculas) -> elemento .rule, para hacer "flash" al dispararse
    const ruleIndex = new Map();

    function condLabel(rule) {
      const parts = [];
      if (rule.minDiamonds > 0) parts.push('≥ ' + rule.minDiamonds + ' 💎');
      if (rule.repeatPerGift) parts.push('x' + (rule.maxRepeat || 50));
      return parts.join(' · ');
    }

    function renderLegend(actions) {
      ruleIndex.clear();
      rulesEl.innerHTML = '';
      const rules = (actions && Array.isArray(actions.rules) ? actions.rules : [])
        .filter((r) => r && r.enabled !== false);

      if (!actions || actions.enabled === false || rules.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'legend-empty';
        empty.textContent = actions && actions.enabled === false
          ? 'Acciones de Minecraft desactivadas'
          : 'Aún no hay regalos configurados';
        rulesEl.appendChild(empty);
        return;
      }

      for (const rule of rules) {
        const row = document.createElement('div');
        row.className = 'rule';
        const cond = condLabel(rule);
        row.innerHTML =
          '<span class="gift">🎁 ' + escapeHtml(rule.giftName || 'Cualquiera') + '</span>' +
          '<span class="arrow">&rarr;</span>' +
          '<span class="cmd">' + escapeHtml(rule.command || '') + '</span>' +
          (cond ? '<span class="cond">' + cond + '</span>' : '');
        rulesEl.appendChild(row);
        if (rule.giftName) ruleIndex.set(String(rule.giftName).toLowerCase(), row);
      }
    }

    function flashRule(giftName) {
      const row = ruleIndex.get(String(giftName || '').toLowerCase());
      if (!row) return;
      row.classList.remove('flash');
      void row.offsetWidth; // reinicia la animación
      row.classList.add('flash');
    }

    function showToast(data) {
      flashRule(data.giftName);

      const toast = document.createElement('div');
      toast.className = 'toast';
      const ava = data.giftImage
        ? '<div class="ava"><img src="' + escapeAttr(data.giftImage) + '" alt=""></div>'
        : '<div class="ava">🎁</div>';
      toast.innerHTML =
        ava +
        '<div class="body">' +
          '<div class="who">' + escapeHtml(data.user || 'alguien') + '</div>' +
          '<div class="what">envió <b>' + escapeHtml(data.giftName || 'un regalo') + '</b> → ' +
            escapeHtml(data.command || '') + '</div>' +
        '</div>' +
        (data.repeat > 1 ? '<div class="badge">x' + data.repeat + '</div>' : '');
      toastsEl.appendChild(toast);
      requestAnimationFrame(() => toast.classList.add('show'));

      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 400);
      }, 5000);

      // No dejar crecer la pila infinitamente
      while (toastsEl.children.length > 6) toastsEl.removeChild(toastsEl.firstChild);
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => (
        { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
      ));
    }
    function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }

    const socket = io(); // mismo origen (http://localhost:3000)

    socket.on('connect', () => {
      connEl.classList.add('on');
      connText.textContent = 'conectado';
      socket.emit('getAlertConfig', (cfg) => {
        if (cfg && cfg.minecraftActions) renderLegend(cfg.minecraftActions);
      });
    });
    socket.on('disconnect', () => {
      connEl.classList.remove('on');
      connText.textContent = 'desconectado';
    });

    // La leyenda se actualiza sola cuando guardas reglas en StreamSync.
    socket.on('alertConfig', (cfg) => {
      if (cfg && cfg.minecraftActions) renderLegend(cfg.minecraftActions);
    });

    // Disparo en vivo: un regalo ejecutó un comando.
    socket.on('minecraftGift', (data) => showToast(data || {}));
  </script>
</body>
</html>
